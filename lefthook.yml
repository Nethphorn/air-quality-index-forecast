# Lefthook Git Hook configuration
# Documentation: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{js,json,md,yml,yaml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    cspell:
      glob: "*"
      run: npx cspell {staged_files}
    # Future Placeholder for Python linting:
    # ruff:
    #   glob: "*.py"
    #   run: ruff check {staged_files} --fix
    #   stage_fixed: true
