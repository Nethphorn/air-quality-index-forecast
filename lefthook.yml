# Lefthook Git Hook configuration
# Documentation: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    prettier:
      glob: '*.{js,ts,json,md,yml,yaml}'
      run: pnpm exec prettier --color=false --log-level=warn --write {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{js,ts,json}'
      run: pnpm exec eslint --no-color {staged_files}
    cspell:
      glob: '*'
      run: pnpm exec cspell --no-color {staged_files}

pre-push:
  commands:
    # playwright:
    #   run: pnpm test
    audit:
      run: pnpm audit --audit-level high
