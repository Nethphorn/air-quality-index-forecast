# Lefthook Git Hook configuration
# Documentation: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{js,ts,json,md,yml,yaml}'
      run: pnpm prettier --write {staged_files} && git add {staged_files}
    eslint:
      glob: '*.{js,ts}'
      run: pnpm eslint {staged_files}
    cspell:
      glob: '*'
      run: pnpm cspell {staged_files}

pre-push:
  commands:
    playwright:
      run: pnpm test
    audit:
      run: pnpm audit --audit-level high
